<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-container">
    <div class="form-box">
      <h2>Passport Application Form</h2>
      <p class="small-text">Step 1 of 3</p>

      <form id="passportForm">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter full name">

        <label>Date of Birth</label>
        <input type="date" id="dob">

        <label>Gender</label>
        <select id="gender">
          <option value="">Select gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <label>Mobile Number</label>
        <input type="tel" id="mobile" maxlength="10" placeholder="Enter mobile number">

        <label>Email</label>
        <input type="email" id="formEmail" placeholder="Enter email">

        <label>City</label>
        <input type="text" id="city" placeholder="Enter city">

        <label>Address</label>
        <textarea id="address" rows="4" placeholder="Enter address"></textarea>

        <p id="saveMessage" class="small-text"></p>

        <div class="button-row">
          <button type="button" class="btn" onclick="saveFormData()">Save Draft</button>
          <button type="submit" class="btn">Next</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
